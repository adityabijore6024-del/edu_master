{% extends "partials/base.html" %}
{% block title %}Forgot Password – EduPeak{% endblock %}

{% block content %}
<div class="ep-auth-page" style="grid-template-columns: 1fr;">
  <div class="ep-auth-panel">
    <div class="ep-auth-box">
      <div class="text-center mb-4">
        <div class="ep-logo-icon" style="width:60px;height:60px;font-size:1.75rem;margin:0 auto 1.5rem;"><i class="bi bi-key-fill"></i></div>
      </div>
      <h1 class="ep-auth-title text-center">Forgot your password?</h1>
      <p class="ep-auth-subtitle text-center">Enter your registered email and we'll send you a reset link.</p>

      <form method="post" novalidate>
        {% csrf_token %}
        <div class="ep-form-group">
          <label class="ep-label">Email Address</label>
          <div class="ep-input-icon-wrap">
            <i class="bi bi-envelope ep-input-icon"></i>
            {{ form.email }}
          </div>
        </div>
        <button type="submit" class="ep-btn ep-btn-primary ep-btn-lg w-100">Send Reset Link <i class="bi bi-send"></i></button>
      </form>

      <p class="text-center mt-3"><a href="/auth/login/"><i class="bi bi-arrow-left"></i> Back to Login</a></p>
    </div>
  </div>
</div>
<style>
  .ep-input-icon-wrap input { width: 100%; padding: 0.7rem 1rem 0.7rem 2.75rem; background: var(--ep-surface); border: 1.5px solid var(--ep-border); border-radius: var(--ep-radius); font-size: 0.925rem; color: var(--ep-text); outline: none; transition: all var(--ep-transition); }
  .ep-input-icon-wrap input:focus { border-color: var(--ep-primary); box-shadow: var(--ep-shadow-glow); }
</style>
{% endblock %}
