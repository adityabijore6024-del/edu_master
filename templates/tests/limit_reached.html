{% extends "partials/base.html" %}
{% block title %}Attempt Limit Reached{% endblock %}

{% block content %}
<div class="ep-container text-center" style="padding:6rem 0;max-width:500px;">
  <div style="width:90px;height:90px;border-radius:50%;background:rgba(245,158,11,0.1);display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:var(--ep-accent);margin:0 auto 1.5rem;">
    <i class="bi bi-exclamation-triangle-fill"></i>
  </div>
  <h1 class="ep-page-title mb-2">Attempt Limit Reached</h1>
  <p class="text-muted mb-4">You've used all your attempts for "{{ test.title }}".</p>
  <a href="/tests/" class="ep-btn ep-btn-primary ep-btn-lg">Browse Other Tests</a>
</div>
{% endblock %}
